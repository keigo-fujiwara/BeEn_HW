<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeEnクイズ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <h1 class="brand-name">BeEngineer</h1>
        </div>
        <p class="tagline">宿題モードまたは確認テストで学習できます。</p>
      </header>

      <section class="panel setup" id="setupPanel">
        <h2 class="panel-title">コース・単元の選択</h2>
        <p class="hint" id="catalogHint">データを読み込み中です…</p>

        <div class="setup-stack">
          <div class="field-block">
            <label class="inline-label" for="courseSelect">コース</label>
            <select id="courseSelect" class="select" disabled>
              <option value="">— コースを選択 —</option>
            </select>
          </div>
          <div class="field-block field-block--unit">
            <label class="inline-label" for="unitSelectTrigger">単元（分野ごとにグループ表示）</label>
            <div class="unit-select-combo" id="unitSelectCombo">
              <button
                type="button"
                class="unit-select-trigger select"
                id="unitSelectTrigger"
                disabled
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="unitSelectPanel"
              >
                — まずコースを選択 —
              </button>
              <div class="unit-select-panel" id="unitSelectPanel" role="listbox" hidden></div>
              <select id="unitSelect" class="unit-select-native" tabindex="-1" aria-hidden="true" disabled>
                <option value="">— まずコースを選択 —</option>
              </select>
            </div>
          </div>
        </div>

        <div class="setup-row">
          <button type="button" class="btn btn-primary" id="btnLoadUnit" disabled>単元を読み込む</button>
        </div>

        <p class="unit-title-display" id="unitTitleDisplay">単元名: （未読み込み）</p>
        <div class="mode-buttons" id="modeButtons" hidden>
          <button type="button" class="btn btn-primary" id="btnHomework">宿題モード</button>
          <button type="button" class="btn btn-primary" id="btnTest">確認テストモード</button>
        </div>
      </section>

      <main class="main" id="mainArea" hidden>
        <div class="toolbar">
          <button type="button" class="btn btn-ghost" id="btnBack">← コース・単元選択に戻る</button>
          <span class="toolbar-badge" id="modeBadge"></span>
        </div>

        <section class="panel homework-panel" id="homeworkPanel" hidden>
          <h2 class="panel-title" id="homeworkHeading">宿題モード</h2>
          <div class="study-progress" id="homeworkProgress" aria-live="polite"></div>
          <div class="test-card" id="homeworkCard">
            <p class="question-text" id="homeworkQuestion"></p>
            <div class="options cols-2" id="homeworkOptions"></div>
            <div id="homeworkCommentaryWrap" hidden></div>
            <button type="button" class="btn btn-primary homework-next-btn" id="homeworkNext" hidden>
              次の問題へ
            </button>
          </div>
          <div class="completion-banner" id="homeworkComplete" hidden role="status">
            <strong class="completion-title">宿題、おつかれさま！</strong>
            <p class="homework-result-line" id="homeworkScoreSummary"></p>
            <p class="completion-sub" id="homeworkCompleteCheer"></p>
          </div>
        </section>

        <section class="panel test-panel" id="testPanel" hidden>
          <h2 class="panel-title">確認テスト</h2>
          <p class="test-unit-line" id="testUnitLine"></p>
          <p class="hint test-intro" id="testIntro"></p>
          <div class="test-progress-sticky-wrap" id="testProgressWrap">
            <div class="study-progress study-progress--test-pending" id="testProgress" aria-live="polite"></div>
          </div>
          <div class="test-form-wrap" id="testFormWrap">
            <div class="test-all-questions" id="testList"></div>
            <button type="button" class="btn btn-primary test-submit-btn" id="btnSubmitTest">提出する</button>
          </div>
          <div class="test-result" id="testResult" hidden>
            <div class="test-result-summary">
              <p class="test-result-unit" id="testResultUnit"></p>
              <p class="test-time-notice" id="testTimeNotice" hidden></p>
              <p class="score-line" id="scoreLine"></p>
              <p class="pass-line" id="passLine"></p>
            </div>
            <div class="test-result-detail" id="testResultDetail"></div>
            <button type="button" class="btn btn-primary" id="btnRetryTest">もう一度テスト</button>
          </div>
        </section>
      </main>

      <footer class="footer">
        <small>ブラウザの制約により、ローカルでは HTTP サーバー経由での起動を推奨します。</small>
      </footer>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
